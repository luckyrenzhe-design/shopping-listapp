<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 28px 28px 20px;
      color: #fff;
    }

    header h1 { font-size: 1.6rem; font-weight: 700; }

    .stats {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4338ca; }
    .input-row button:active { transform: scale(0.97); }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 10px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: transparent;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #6b7280;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    ul {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    li:last-child { border-bottom: none; }
    li:hover { background: #f9fafb; }

    li.done .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    li.done .checkbox {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .checkbox svg { display: none; }
    li.done .checkbox svg { display: block; }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-word;
    }

    .del-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .del-btn:hover { color: #ef4444; background: #fee2e2; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .clear-row {
      padding: 10px 20px 16px;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: transparent;
      border: 1.5px solid #fca5a5;
      color: #ef4444;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { background: #fee2e2; }
    .clear-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
<div class="card">
  <header>
    <h1>🛒 쇼핑 리스트</h1>
    <div class="stats" id="stats">0개 항목</div>
  </header>

  <div class="input-row">
    <input id="itemInput" type="text" placeholder="항목 입력 후 추가..." maxlength="80" />
    <button onclick="addItem()">추가</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">미완료</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done')">완료</button>
  </div>

  <ul id="list"></ul>

  <div class="clear-row">
    <button class="clear-btn" id="clearBtn" onclick="clearDone()">완료 항목 삭제</button>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('shoppingItems') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('shoppingItems', JSON.stringify(items));
  }

  function render() {
    const list = document.getElementById('list');
    const filtered = items.filter(item => {
      if (filter === 'pending') return !item.done;
      if (filter === 'done') return item.done;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">${filter === 'done' ? '완료된 항목이 없습니다.' : filter === 'pending' ? '미완료 항목이 없습니다.' : '항목을 추가해 보세요!'}</div>`;
    } else {
      list.innerHTML = filtered.map(item => `
        <li class="${item.done ? 'done' : ''}" id="li-${item.id}">
          <div class="checkbox" onclick="toggleItem(${item.id})">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1 5l3.5 3.5L12 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="item-text">${escHtml(item.text)}</span>
          <button class="del-btn" onclick="deleteItem(${item.id})" title="삭제">✕</button>
        </li>
      `).join('');
    }

    const total = items.length;
    const done = items.filter(i => i.done).length;
    document.getElementById('stats').textContent =
      total === 0 ? '항목이 없습니다' : `${done}/${total}개 완료`;

    document.getElementById('clearBtn').disabled = done === 0;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addItem() {
    const input = document.getElementById('itemInput');
    const text = input.value.trim();
    if (!text) return;
    items.push({ id: Date.now(), text, done: false });
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.done = !item.done; save(); render(); }
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearDone() {
    items = items.filter(i => !i.done);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  }

  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  render();
</script>
</body>
</html>
